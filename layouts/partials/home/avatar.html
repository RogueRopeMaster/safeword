{{ $avatarAlt := .Site.Params.author | default .Site.Title }}
{{ if and (isset .Site.Params "avatarurl") (not (isset .Site.Params "gravatar")) }}
  {{ with .Site.Params.avatarURL }}
    <div class="avatar"><img src="{{ . | relURL }}" alt="{{ $avatarAlt }}" width="1164" height="1330" loading="eager" decoding="async"></div>
  {{ end }}
{{ end }}
{{ with .Site.Params.gravatar }}
  <div class="avatar"><img src="https://www.gravatar.com/avatar/{{ md5 . }}?s=240&d=mp" alt="{{ $avatarAlt }}" width="240" height="240" loading="eager" decoding="async"></div>
{{ end }}
